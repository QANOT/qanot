site_name: Qanot AI Docs
site_url: https://plane.topkey.uz/docs/
site_description: Documentation for Qanot AI — lightweight Python agent framework
repo_url: https://github.com/QANOT/qanot
repo_name: QANOT/qanot

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide: GUIDE.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Providers: providers.md
  - Tools: tools.md
  - Plugins: plugins.md
  - Memory: memory.md
  - RAG: rag.md
  - Telegram: telegram.md
  - Scheduler: scheduler.md
  - API Reference: api-reference.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/qanot_bot
    - icon: fontawesome/brands/github
      link: https://github.com/QANOT
