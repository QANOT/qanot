<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>qanot-video smoke composition</title>
  <!--
    Placeholder smoke composition for Phase 2 integration tests.
    Phase 2 will replace this with a real HyperFrames-conformant 2-second
    composition. Do not delete -- the integration test references this path.
  -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    html, body { margin: 0; width: 1080px; height: 1920px; background: #0a0a0a; color: #fff; font-family: system-ui; overflow: hidden; }
    .stage { display: flex; align-items: center; justify-content: center; height: 100%; }
    h1 { font-size: 96px; margin: 0; }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="2" data-width="1080" data-height="1920">
    <div class="stage"><h1 id="title">qanot smoke</h1></div>
  </div>
  <script>
    const tl = gsap.timeline({paused: true});
    tl.from("#title", { opacity: 0, y: 40, duration: 0.6 }, 0)
      .to("#title",   { opacity: 0, y: -30, duration: 0.5 }, 1.5);
    window.__timelines = { main: tl };
  </script>
</body>
</html>
