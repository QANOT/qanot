name: video-service

on:
  push:
    branches: [main]
    paths:
      - "services/video/**"
      - ".github/workflows/video-service.yml"
  pull_request:
    paths:
      - "services/video/**"
      - ".github/workflows/video-service.yml"

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: video-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + typecheck + test
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/video

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('services/video/bun.lock', 'services/video/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Test (vitest)
        # Real-render integration test is gated by RUN_INTEGRATION=1 and
        # skipped here. See video-service-real-render.yml for the manual
        # workflow that exercises the full pipeline (Chromium + FFmpeg).
        run: bun run test
        env:
          NODE_ENV: test
          RUN_INTEGRATION: "0"
